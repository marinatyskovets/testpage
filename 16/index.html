<!DOCTYPE html>
<html lang="ru">

    <head>

        <title>Effective Cover Letter</title>
        <meta content="" name="description">
        <meta content="" name="keywords">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=contain">
        <meta content="telephone=no" name="format-detection">
        <meta name="HandheldFriendly" content="true">
        <meta name="theme-color" content="#ffffff">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <body>

            <div class="w-page__top">
                <!-- ---------------  Top part page ----------------->

                <header class="c-header">
                    <div class="c-header__top">
                        <div class="c-header__cell">
                            <button class="c-icon-button c-icon-button--lg" type="button" aria-label="Click on back button">

                                </svg>
                            </button>
                        </div>
                        <div class="c-header__cell">
                            <div class="c-header__title">Finalize</div>
                        </div>
                        <div class="c-header__cell">
                            <button class="c-icon-button c-icon-button--lg" type="button" aria-label="Zoom" data-bs-toggle="modal" data-bs-target="#resume-preview">
                                <svg class="c-ico c-ico--xl c-ico--primary" viewBox="0 0 24 24">

                                </svg>
                            </button>
                        </div>
                    </div>
                </header>
                <!-- end header-->
            </div>

                <!-- ---------------  Main part page ----------------->
                <main class="w-main w-main--extra-long">
                    <div class="w-main__content">
                        <!-- ---------------  Main content part page ----------------->
                        <div class="w-gap-sm">
                            <!-- begin pagination-->
                            <div class="c-pagination c-pagination--accent">
                                <button class="c-pagination__btn-prev is-disabled" type="button" aria-label="prev">
                                    <svg class="c-ico c-ico--md c-ico--inherit" viewBox="0 0 24 24">
                                        <!-- ico name: arrow-left-circle-->
                                        <path fill="currentColor" d="M2,12A10,10 0 0,1 12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12M18,11H10L13.5,7.5L12.08,6.08L6.16,12L12.08,17.92L13.5,16.5L10,13H18V11Z"></path>

                                </button>

                                    <svg class="c-ico c-ico--md c-ico--inherit" viewBox="0 0 24 24">

                                        <path fill="currentColor" d="M22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2A10,10 0 0,1 22,12M6,13H14L10.5,16.5L11.92,17.92L17.84,12L11.92,6.08L10.5,7.5L14,11H6V13Z"></path>

                                <div class="c-edit-section__title">Name and Contact</div>
                            </div>
                            <!-- end edit-section-->
                            <!-- begin edit-section-->
                            <div class="c-edit-section">
                                <button class="c-icon-button c-icon-button--lg c-edit-section__btn-left" type="button" aria-label="section-move">
                                    <svg class="c-ico c-ico--xl c-ico--secondary" viewBox="0 0 24 24">
                                        <!-- ico name: arrow-split-horizontal-->
                                        <path fill="currentColor" d="M8,18H11V15H2V13H22V15H13V18H16L12,22L8,18M12,2L8,6H11V9H2V11H22V9H13V6H16L12,2Z"></path>

                                        <!-- ico name: trash-can-->
                                        <path fill="currentColor" d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M9,8H11V17H9V8M13,8H15V17H13V8Z"></path>

                                    <svg class="c-ico c-ico--xl c-ico--secondary" viewBox="0 0 24 24">
                                        <!-- ico name: arrow-split-horizontal-->
                                        <path fill="currentColor" d="M8,18H11V15H2V13H22V15H13V18H16L12,22L8,18M12,2L8,6H11V9H2V11H22V9H13V6H16L12,2Z"></path>
                                    </svg>
                                </button>
                                <div class="c-edit-section__title">Skills</div>
                                <button class="c-icon-button c-icon-button--lg c-edit-section__btn-right" type="button" aria-label="section-delete">
                                    <svg class="c-ico c-ico--xl c-ico--secondary" viewBox="0 0 24 24">
                                        <!-- ico name: trash-can-->
                                        <path fill="currentColor" d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M9,8H11V17H9V8M13,8H15V17H13V8Z"></path>
                                    </svg>
                                </button>
                            </div>
                            <!-- end edit-section-->
                            <!-- begin edit-section-->
                            <div class="c-edit-section">
                                <button class="c-icon-button c-icon-button--lg c-edit-section__btn-left" type="button" aria-label="section-move">
                                    <svg class="c-ico c-ico--xl c-ico--secondary" viewBox="0 0 24 24">
                                        <!-- ico name: arrow-split-horizontal-->
                                        <path fill="currentColor" d="M8,18H11V15H2V13H22V15H13V18H16L12,22L8,18M12,2L8,6H11V9H2V11H22V9H13V6H16L12,2Z"></path>

                                    <svg class="c-ico c-ico--xl c-ico--secondary" viewBox="0 0 24 24">
                                        <!-- ico name: trash-can-->
                                        <path fill="currentColor" d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M9,8H11V17H9V8M13,8H15V17H13V8Z"></path>
                                    </svg>
                                </button>
                            </div>
                            <!-- end edit-section-->
                        </div>
                    </div>
                    <div class="w-main__bottom w-main__bottom--sticky">
                        <!-- ---------------  Main bottom part page ----------------->
                        <!-- begin action-buttons-->
                        <div class="c-column-gap-sm">
                            <button class="c-btn" type="button">Finish Editing
                            </button>
                        </div>
                        <!-- end action-buttons-->
                    </div>

                </footer>
                <!-- end footer-->
