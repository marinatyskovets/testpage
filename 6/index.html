<!DOCTYPE html>
<html lang="ru">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Effective Cover Letter</title>
        <meta content="" name="description">
        <meta content="" name="keywords">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=contain">
        <meta content="telephone=no" name="format-detection">
        <meta name="HandheldFriendly" content="true">
        <meta name="theme-color" content="#ffffff">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=block" rel="stylesheet">
        <link href="static/css/main.min.css" rel="stylesheet" type="text/css">
        <link rel="icon" type="image/x-icon" href="favicon.ico">
    </head>

    <body>
        <!-- ------------------------------ TEMPLATE DEFAULT -------------------------------->
        <div class="w-page">
            <div class="w-page__top">
                <!-- ---------------  Top part page ----------------->
                <!-- begin header-->
                <header class="c-header">
                    <div class="c-header__top">
                        <div class="c-header__cell">
                            <button class="c-icon-button c-icon-button--lg" type="button" aria-label="Click on back button">
                                <svg class="c-ico c-ico--xl c-ico--primary" viewBox="0 0 24 24">
                                    <!-- ico name: arrow-left-->
                                    <path fill="currentColor" d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="c-header__cell">
                            <div class="c-header__title">Education</div>
                        </div>
                        <div class="c-header__cell">
                            <button class="c-icon-button c-icon-button--lg" type="button" aria-label="Zoom" data-bs-toggle="modal" data-bs-target="#resume-preview">
                                <svg class="c-ico c-ico--xl c-ico--primary" viewBox="0 0 24 24">
                                    <!-- ico name: magnify-plus-outline-->
                                    <path fill="currentColor" d="M15.5,14L20.5,19L19,20.5L14,15.5V14.71L13.73,14.43C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.43,13.73L14.71,14H15.5M9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14M12,10H10V12H9V10H7V9H9V7H10V9H12V10Z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </header>
                <!-- end header-->
                <!-- begin progress-bar-->
                <div class="c-progress-bar">
                    <div class="c-progress-bar__line" style="width: 26%"></div>
                </div>
                <!-- end progress-bar-->
            </div>
            <div class="w-page__content">
                <!-- ---------------  Main part page ----------------->
                <main class="w-main">
                    <div class="w-main__content">
                        <!-- ---------------  Main content part page ----------------->
                        <div class="w-gap-md c-column-gap-sm u-text-center">
                            <div class="c-h2">Which option best reflects your education level?</div>
                            <div class="c-h4 u-text-normal u-mt-0">Choose the most suitable option, and we'll help you format your education section.</div>
                        </div>
                        <div class="w-gap-md c-column-gap-sm">
                            <button class="c-option-btn" type="button">Certificate or Diploma
                            </button>
                            <button class="c-option-btn" type="button">Apprenticeship or Internship Training
                            </button>
                            <button class="c-option-btn" type="button">Completed Coursework
                            </button>
                            <button class="c-option-btn" type="button">Associates
                            </button>
                            <button class="c-option-btn" type="button">Bachelors or Honours
                            </button>
                            <button class="c-option-btn" type="button">Masters
                            </button>
                            <button class="c-option-btn" type="button">Doctorate or Ph.D
                            </button>
                        </div>
                        <div class="c-row c-row--justify-center w-gap-md">
                            <button class="c-btn c-btn--ghost" type="button">Prefer not to answer
                            </button>
                        </div>
                    </div>
                    <div class="w-main__bottom">
                        <!-- ---------------  Main bottom part page ----------------->
                    </div>
                </main>
            </div>
            <div class="w-page__bottom">
                <!-- ---------------  Bottom part page ----------------->
                <!-- begin footer-->
                <footer class="c-footer">
                    <div class="c-row c-row--nowrap c-row--justify-between c-row--align-center c-row--row-gap-sm">
                        <a class="c-link" href="#">Terms & Conditions
                  </a>
                        <a class="c-link" href="#">Privacy Policy
                  </a>
                        <a class="c-link" href="#">Acccessibility
                  </a>
                        <a class="c-link" href="#">Contact Us
                  </a>
                    </div>
                    <div class="c-footer__copyright">© 2026, EffectiveCoverLetter - All rights reserved</div>
                </footer>
                <!-- end footer-->
            </div>
        </div>
        <!-- --------------- Outside part page ----------------->
        <!-- Including js files-->


        <script src="static/js/separate-js/jquery-3.7.1.min.js"></script>
        <script src="static/js/separate-js/jquery.autocomplete.min.js"></script>
        <script src="static/js/separate-js/bootstrap.bundle.min.js"></script>
        <script src="static/js/separate-js/toggleFocusInput.js"></script>
        <script src="static/js/separate-js/swiper-bundle.min.js"></script>
        <script src="static/js/separate-js/main.js"></script>
    </body>

</html>
