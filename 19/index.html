<!DOCTYPE html>
<html lang="ru">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Effective Cover Letter</title>
        <meta content="" name="description">
        <meta content="" name="keywords">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=contain">
        <meta content="telephone=no" name="format-detection">
        <meta name="HandheldFriendly" content="true">
        <meta name="theme-color" content="#ffffff">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=block" rel="stylesheet">
        <link href="static/css/main.min.css" rel="stylesheet" type="text/css">
        <link rel="icon" type="image/x-icon" href="favicon.ico">
    </head>

    <body>
        <!-- ------------------------------ TEMPLATE DEFAULT -------------------------------->
        <div class="w-page">
            <div class="w-page__top">
                <!-- ---------------  Top part page ----------------->
                <!-- begin header-->
                <header class="c-header">
                    <div class="c-header__top">
                        <div class="c-header__cell">
                            <button class="c-icon-button c-icon-button--lg" type="button" aria-label="Click on back button">
                                <svg class="c-ico c-ico--xl c-ico--primary" viewBox="0 0 24 24">
                                    <!-- ico name: arrow-left-->
                                    <path fill="currentColor" d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </header>
                <!-- end header-->
            </div>
            <div class="w-page__content">
                <!-- ---------------  Main part page ----------------->
                <main class="w-main">
                    <div class="w-main__content">
                        <!-- ---------------  Main content part page ----------------->
                        <div class="w-gap-md c-column-gap-sm u-text-center">
                            <div class="c-h3">Are you uploading an existing resume</div>
                            <div class="c-h4 u-text-normal">Just review, edit, and update it with new information</div>
                        </div>
                        <div class="w-gap-md c-column-gap-sm">
                            <!-- begin option-large-card-->
                            <button class="c-option-large-card" type="button"><span class="c-option-large-card__icon">
                    <svg class="c-ico c-ico--sm c-ico--inherit" viewBox="0 0 24 24"><!-- ico name: cloud-upload-outline-->
                      <path fill="currentColor" d="M6.5 20Q4.22 20 2.61 18.43 1 16.85 1 14.58 1 12.63 2.17 11.1 3.35 9.57 5.25 9.15 5.88 6.85 7.75 5.43 9.63 4 12 4 14.93 4 16.96 6.04 19 8.07 19 11 20.73 11.2 21.86 12.5 23 13.78 23 15.5 23 17.38 21.69 18.69 20.38 20 18.5 20H13Q12.18 20 11.59 19.41 11 18.83 11 18V12.85L9.4 14.4L8 13L12 9L16 13L14.6 14.4L13 12.85V18H18.5Q19.55 18 20.27 17.27 21 16.55 21 15.5 21 14.45 20.27 13.73 19.55 13 18.5 13H17V11Q17 8.93 15.54 7.46 14.08 6 12 6 9.93 6 8.46 7.46 7 8.93 7 11H6.5Q5.05 11 4.03 12.03 3 13.05 3 14.5 3 15.95 4.03 17 5.05 18 6.5 18H9V20M12 13Z"></path>
                    </svg></span><span class="c-option-large-card__content"><span class="c-option-large-card__title">Yes, Upload from resume</span><span class="c-option-large-card__text">From start to finish, our experts will help you fill in your details and refine your resume.</span></span>
                            </button>
                            <!-- end option-large-card-->
                            <!-- begin option-large-card-->
                            <button class="c-option-large-card" type="button"><span class="c-option-large-card__icon">
                    <svg class="c-ico c-ico--sm c-ico--inherit" viewBox="0 0 24 24"><!-- ico name: text-box-plus-outline-->
                      <path fill="currentColor"></path>
                    </svg></span><span class="c-option-large-card__content"><span class="c-option-large-card__title">No, Start from scratch</span><span class="c-option-large-card__text">We'll support you every step of the way, ensuring your skills truly stand out.</span></span>
                            </button>
                            <!-- end option-large-card-->
                        </div>
                    </div>
                    <div class="w-main__bottom">
                        <!-- ---------------  Main bottom part page ----------------->
                        <!-- begin action-buttons-->
                        <div class="c-column-gap-sm">
                            <button class="c-btn" type="button">Next
                                <svg class="c-ico c-ico--lg c-ico--inherit c-btn__ico-right" viewBox="0 0 24 24">
                                    <!-- ico name: arrow-right-->
                                    <path fill="currentColor" d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z"></path>
                                </svg>
                            </button>
                        </div>
                        <!-- end action-buttons-->
                    </div>
                </main>
            </div>
            <div class="w-page__bottom">
                <!-- ---------------  Bottom part page ----------------->
                <!-- begin footer-->
                <footer class="c-footer">
                    <div class="c-row c-row--nowrap c-row--justify-between c-row--align-center c-row--row-gap-sm">
                        <a class="c-link" href="#">Terms & Conditions
                  </a>
                        <a class="c-link" href="#">Privacy Policy
                  </a>
                        <a class="c-link" href="#">Acccessibility
                  </a>
                        <a class="c-link" href="#">Contact Us
                  </a>
                    </div>
                    <div class="c-footer__copyright">© 2026, EffectiveCoverLetter - All rights reserved</div>
                </footer>
                <!-- end footer-->
            </div>
        </div>
        <!-- --------------- Outside part page ----------------->
        <!-- Including js files-->


        <script src="static/js/separate-js/jquery-3.7.1.min.js"></script>
        <script src="static/js/separate-js/jquery.autocomplete.min.js"></script>
        <script src="static/js/separate-js/bootstrap.bundle.min.js"></script>
        <script src="static/js/separate-js/toggleFocusInput.js"></script>
        <script src="static/js/separate-js/swiper-bundle.min.js"></script>
        <script src="static/js/separate-js/main.js"></script>
    </body>

</html>
